<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter — Perimeter</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav>
  <div class="inner">
    <a href="/" class="wordmark">Mighty<span>Pickle</span>.dev</a>
    <ul>
      <li><a href="/perimeter/">Perimeter</a></li>
    </ul>
  </div>
</nav>

<main>
  <div class="container" style="padding-top:80px;padding-bottom:100px;max-width:520px;text-align:center;">
    <h1 style="font-size:32px;font-weight:800;letter-spacing:-0.5px;margin-bottom:12px;">Stay in the loop</h1>
    <p style="color:var(--muted);font-size:16px;line-height:1.7;margin-bottom:36px;">New glow patterns, feature updates, and the occasional interesting link. Once a month, never spammy.</p>

    <form action="https://buttondown.com/api/emails/embed-subscribe/mightypickle" method="post" target="popupwindow" style="display:flex;flex-direction:column;gap:12px;align-items:center;">
      <input type="email" name="email" placeholder="you@example.com" required
        style="width:100%;max-width:360px;padding:14px 18px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:16px;outline:none;">
      <button type="submit"
        style="padding:12px 32px;border-radius:10px;border:none;background:var(--accent);color:#000;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.15s;">
        Subscribe
      </button>
    </form>

    <p style="color:var(--muted);font-size:13px;margin-top:24px;">No spam, unsubscribe anytime. Powered by Buttondown.</p>
  </div>
</main>

<footer>
  <p>&copy; 2026 Mighty Pickle &middot; <a href="mailto:support@mightypickle.dev">support@mightypickle.dev</a></p>
</footer>

</body>
</html>
